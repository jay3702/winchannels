name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install LLVM (ARM64 cross-compile)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: choco install llvm --no-progress -y

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          CC_aarch64_pc_windows_msvc: clang-cl
          CXX_aarch64_pc_windows_msvc: clang-cl
          AR_aarch64_pc_windows_msvc: llvm-lib
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*.msi
            release-artifacts/*-setup.exe
